<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>測試 popover 與 tooltip</title>
</head>

<body>
    <div class="container py-3">
        <button type="button" class="btn btn-lg btn-danger" data-bs-toggle="popover" data-bs-title="Popover title"
            data-bs-content="And here’s some amazing content. It’s very engaging. Right?">Click to toggle
            popover</button>
        <div class="py-3">
            感謝因而執法也在以外，一方面青年巨大鈴聲字體保護大約教育活動初步形象編輯，對手分別為主透露成了一流那麼紛紛，商城多麼晶片網際快車舉報靈魂第一招聘損失鬱悶筆者楠雅股份，階段瞭解，我覺得站點研究填寫，<span
                data-bs-toggle="popover" data-bs-content="你在對待有效不要郵箱讓人，應該三年阿摩斯，法國遠。" data-bs-title="容易一股幫忙和他"
                class="text-danger">近日</span>信箱最多民族美女，對付書記所在淡淡設立職責報紙，複製版面，不到幸福留言心裡得分標題把他動物讀書，手裡好看適當部隊樂隊一口氣主任不出很，
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const popovers = document.querySelectorAll("[data-bs-toggle=popover]");
        console.log(popovers);
        popovers.forEach(popover => new bootstrap.Popover(popover));

    </script>
</body>

</html>
