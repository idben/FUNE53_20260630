<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .w180px {
            width: 180px;
        }

        .aa {
            aspect-ratio: 9/16;
        }
    </style>
    <title>Bootstrap 版型</title>
</head>

<body>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary">
        Launch demo modal
    </button>

    <div class="w180px ratio ratio-1x1 mt-5">
        <img class="img-fluid object-fit-cover" src="https://img.youtube.com/vi/Ig6u1WxnaQo/maxresdefault.jpg" alt="">
    </div>

    <div class="w180px ratio ratio-4x3 mt-5">
        <img class="img-fluid object-fit-cover" src="https://img.youtube.com/vi/Ig6u1WxnaQo/maxresdefault.jpg" alt="">
    </div>

    <div class="w180px ratio ratio-16x9 mt-5">
        <img class="img-fluid object-fit-cover" src="https://img.youtube.com/vi/Ig6u1WxnaQo/maxresdefault.jpg" alt="">
    </div>

    <div class="w180px ratio ratio-21x9 mt-5">
        <img class="img-fluid object-fit-cover" src="https://img.youtube.com/vi/Ig6u1WxnaQo/maxresdefault.jpg" alt="">
    </div>


    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <iframe width="100%" height="315" src="https://www.youtube.com/embed/Ig6u1WxnaQo"
                        title="YouTube video player" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const myModalElm = document.querySelector("#exampleModal");
        const myModalBodyElm = document.querySelector("#exampleModal .modal-body");
        const myModal = new bootstrap.Modal("#exampleModal", {})

        document.querySelector("button").addEventListener("click", () => {
            myModalBodyElm.innerHTML = `<iframe width="100%" height="315" src="https://www.youtube.com/embed/Ig6u1WxnaQo"
                        title="YouTube video player" frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
            myModal.show();
        });

        myModalElm.addEventListener("hidden.bs.modal", () => {
            myModalBodyElm.innerHTML = "";
        });
    </script>
</body>

</html>
