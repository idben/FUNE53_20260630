<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            height: 100vh;
        }

        .w250px {
            width: 250px;
        }
    </style>
    <title>開合</title>
</head>

<body class="d-flex">
    <nav id="nav" class="collapse collapse-horizontal show">
        <div class="w250px leftMenu p-2 h-100 bg-primary-subtle">
            <button class="btn btn-primary w-100" data-bs-toggle="collapse" data-bs-target="#menu1">選項 1</button>
            <div id="menu1" class="collapse">
                <div class="card card-body p-2">
                    <div class="btn-group-vertical">
                        <button class="btn btn-primary btn-sm">選項 1-1</button>
                        <button class="btn btn-primary btn-sm">選項 1-2</button>
                        <button class="btn btn-primary btn-sm">選項 1-3</button>
                        <button class="btn btn-primary btn-sm">選項 1-4</button>
                    </div>
                </div>
            </div>


            <div class="btn-group-vertical w-100 mt-2">
                <button class="btn btn-primary">選項 2</button>
                <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#menu2">選項 3</button>
                <div id="menu2" class="collapse show w-100">
                    <div class="card card-body p-2 rounded-0">
                        <div class="btn-group-vertical w-100">
                            <button class="btn btn-primary btn-sm w-100">選項 3-1</button>
                            <button class="btn btn-primary btn-sm w-100">選項 3-2</button>
                            <button class="btn btn-primary btn-sm w-100">選項 3-3</button>
                            <button class="btn btn-primary btn-sm w-100">選項 3-4</button>
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">選項 4</button>
                    <ul class="dropdown-menu w-100 p-2">
                        <div class="btn-group-vertical w-100">
                            <button class="btn btn-primary btn-sm w-100">選項 4-1</button>
                            <button class="btn btn-primary btn-sm w-100">選項 4-2</button>
                            <button class="btn btn-primary btn-sm w-100">選項 4-3</button>
                            <button class="btn btn-primary btn-sm w-100">選項 4-4</button>
                        </div>

                    </ul>
                </div>

                <button class="btn btn-primary">選項 5</button>
            </div>
        </div>
    </nav>
    <main class="h-100 flex-fill">
        <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#nav">開合側邊</button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
